<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KodNest AI Solver</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      min-height: 200px;
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #6C63FF 0%, #3ECFCF 100%);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo { font-size: 22px; }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 2px;
    }

    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
    }

    /* ── Body ── */
    .body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    /* Status indicator */
    .status-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 14px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3ECFCF;
      box-shadow: 0 0 6px #3ECFCF;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.4); }
    }

    .status-text { font-size: 12px; color: #94a3b8; }
    .status-text strong { color: #e2e8f0; display: block; font-size: 13px; margin-bottom: 1px; }

    /* Shortcut badge */
    .shortcut-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(108,99,255,0.1);
      border: 1px solid rgba(108,99,255,0.25);
      border-radius: 10px;
      padding: 10px 14px;
    }

    .shortcut-label { font-size: 12px; color: #94a3b8; }

    kbd {
      background: rgba(108,99,255,0.25);
      color: #a5b4fc;
      border-radius: 5px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
      font-family: monospace;
      border: 1px solid rgba(108,99,255,0.4);
    }

    /* Activate button */
    #popup-activate-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #6C63FF, #3ECFCF);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.3px;
    }

    #popup-activate-btn:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    /* API config */
    .config-section label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #7c8db5;
      margin-bottom: 6px;
    }

    .config-row { display: flex; gap: 8px; }

    #popup-api-url {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(108,99,255,0.25);
      border-radius: 8px;
      color: #cbd5e1;
      font-size: 12px;
      padding: 9px 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    #popup-api-url:focus { border-color: #6C63FF; }

    #popup-save-btn {
      padding: 9px 14px;
      background: rgba(108,99,255,0.2);
      border: 1px solid rgba(108,99,255,0.4);
      border-radius: 8px;
      color: #a5b4fc;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    #popup-save-btn:hover { background: rgba(108,99,255,0.35); }

    #popup-save-msg {
      font-size: 11px;
      color: #3ECFCF;
      min-height: 16px;
      margin-top: 4px;
    }

    /* Footer */
    .footer {
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 10px 18px;
      font-size: 11px;
      color: #4a5568;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">🤖</div>
    <div class="header-text">
      <h1>KodNest AI Solver</h1>
      <p>Solve any coding question with AI</p>
    </div>
  </div>

  <div class="body">

    <!-- Status -->
    <div class="status-card">
      <div class="status-dot"></div>
      <div class="status-text">
        <strong>Extension Active</strong>
        Floating button is injected on all pages
      </div>
    </div>

    <!-- Keyboard Shortcut -->
    <div class="shortcut-row">
      <span class="shortcut-label">Keyboard Shortcut</span>
      <div><kbd>Alt</kbd> + <kbd>K</kbd></div>
    </div>

    <!-- Activate button (injects solver on active tab) -->
    <button id="popup-activate-btn">⚡ Open Solver on This Page</button>

    <!-- API URL config -->
    <div class="config-section">
      <label>Backend API URL</label>
      <div class="config-row">
        <input id="popup-api-url" type="text" placeholder="http://localhost:5000/solve" />
        <button id="popup-save-btn">Save</button>
      </div>
      <div id="popup-save-msg"></div>
    </div>

  </div>

  <div class="footer">KodNest AI Solver v1.0 &mdash; Powered by your local backend</div>

  <script src="popup.js"></script>
</body>
</html>
